version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: healthcare-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: healthcare_claims
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_password

      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: healthcare-zookeeper

    environment:
      TZ: Asia/Kolkata
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: healthcare-kafka

    depends_on:
      - zookeeper

    environment:
      TZ: Asia/Kolkata

      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: healthcare-zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: healthcare-kafka-ui

    depends_on:
      - kafka

    environment:
      TZ: Asia/Kolkata

      KAFKA_CLUSTERS_0_NAME: healthcare-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: healthcare-kafka:9092

    ports:
      - "8090:8080"

volumes:
  postgres-data: